paths:
  output_dir: data/20260309_pilot/results/version2/feature_search_base_v2_single_feature_outer

clinical:
  path: data/20260309_pilot/nsclc_n73/20260309_eQTL Study_SNU (Pilot cohort)-2_mod.txt
  column_map:
    patient_id: sample_id
    sex: "Sex M: 1  F: 2"
    age: Age_IO
    histology: Histology_mod
    smoking: "Smoking Never: 0 Ex: 1 Current: 2"
    ecog: "ECOG _PS"
    drug: Drug
    pd_event: PD_Event
    death_event: Death_Event
    pfs_days: "PFS (Days)"
    pfs_event: null
    recist: "RECIST response"
    benefit: "Binarized response"
    egfr_status: EGFR_Mutation_Status_mod
    io_line: IO_Line
    previous_chemo: Previous_palliative_chemo
    previous_target: Previous_palliative_target
    pd_l1_tps: PD-L1_TPS_mod
  derivation:
    pfs_event:
      method: any_of
      source_columns: [pd_event, death_event]
      overwrite: true
    benefit:
      prefer_existing: true
      recist_column: recist
      time_column: pfs_days
      positive_response_values: [CR, PR]
      durable_stable_values: [SD]
      min_days: 183
      positive_values: [1, "1", "YES", "Y", "TRUE", "BENEFIT", "RESPONDER", "DCB"]
      negative_values: [0, "0", "NO", "N", "FALSE", "NO BENEFIT", "NONBENEFIT", "NON-BENEFIT", "NCB"]
    restricted_survival:
      - name: PFS_6m_restricted
        source_time_col: pfs_days
        source_event_col: pfs_event
        horizon_days: 183
        time_col: pfs_6m_days
        event_col: pfs_6m_event
        overwrite: true
  exclude_from_modeling: [drug]
  feature_sets:
    base:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
    with_pd_l1:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
      - pd_l1_tps

feature_library:
  tables:
    - path: data/20260309_pilot/results/version2/B/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: B
    - path: data/20260309_pilot/results/version2/CD4T/CellRank_output_from_clean_subset/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: CD4T
    - path: data/20260309_pilot/results/version2/CD8T/CellRank_output_from_clean_subset/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: CD8T
    - path: data/20260309_pilot/results/version2/Monocyte/CellRank_output_from_clean_subset/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: Monocyte
    - path: data/20260309_pilot/results/version2/NK/CellRank_output_from_clean_subset/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: NK
    - path: data/20260309_pilot/results/version2/nonconventional_T/CellRank_output_from_clean_subset/final_feature_df_with_cellrank_b3_filt.csv
      id_col: sample
      name: nonconventional_T
  prefix_mode: stem
  selected_patients_file: data/20260309_pilot/results/20260313_patients_selected.txt
  filters: {}
  carry_columns: []
  drop_columns: []
  candidate_include_regex:
  candidate_exclude_regex:
  feature_catalog_path:
  feature_catalog_feature_col: feature_name

search:
  baseline_clinical_feature_set: base
  baseline:
    mode: clinical_with_pd_l1
  stage2:
    ranking_metric_binary: delta_roc_auc_mean
    ranking_metric_survival: delta_cindex_mean
  stage3:
    top_k_per_endpoint: 12
    max_per_family: 2
    correlation_threshold: 0.8
    vif_max: 10.0
  stage4:
    exhaustive_subset_sizes: []
    heuristic_subset_sizes: []
    beam_width: 1
    max_expansions_per_parent: 0
    max_total_evaluations: 0
  stage5:
    top_n_best_subsets_per_endpoint: 0

parallel:
  enabled: true
  max_workers: 20
  stage2_workers: 20
  stage4_workers: 1

logging:
  verbose: true
  stage_progress_every: 25
  resource_sample_interval_seconds: 0.5

modeling:
  random_state: 42
  endpoints:
    binary:
      - name: Binarized_response
        outcome_col: benefit
        slug: binarized_response
    survival: []
  data_qc:
    min_non_missing_fraction: 0.6
    min_unique_values: 2
  multicollinearity:
    enabled: true
    correlation_threshold: 0.95
    vif:
      enabled: true
      max_vif: 10.0
      max_iter: 50
  resampling:
    n_outer_splits: 5
    n_outer_repeats: 10
    n_inner_splits: 4
  stability:
    method: bootstrap
    n_bootstrap: 500
    selection_threshold: 0.05
    selection_scope: all
  logistic:
    alpha_grid: [1e-3, 3e-3, 1e-2, 3e-2, 1e-1, 3e-1, 1, 3]
    l1_ratio_grid: [0.25, 0.5, 0.75, 0.9, 0.95, 0.99, 1.0]
    selection_rule: best
    max_iter: 5000
  cox:
    penalizer_grid: [1e-3, 3e-3, 1e-2, 3e-2, 1e-1, 3e-1, 1, 3]
    l1_ratio_grid: [0.25, 0.5, 0.75, 0.9, 0.95, 0.99, 1.0]
    selection_rule: best
    clinical_penalty_factor: 1.0

validation:
  outer_search_cv:
    enabled: true
    n_splits: 3
    n_repeats: 1
    candidate_priority: stage2_then_stage4_then_baseline
    write_detailed_cv_files: false
