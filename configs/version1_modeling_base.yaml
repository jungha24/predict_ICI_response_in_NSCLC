paths:
  output_dir: data/20260309_pilot/results/version1/endpoint_modeling/base_run_v4

clinical:
  path: data/20260309_pilot/nsclc_n73/20260309_eQTL Study_SNU (Pilot cohort)-2_mod.txt
  column_map:
    patient_id: sample_id
    sex: "Sex M: 1  F: 2"
    age: Age_IO
    histology: Histology_mod
    smoking: "Smoking Never: 0 Ex: 1 Current: 2"
    ecog: "ECOG _PS"
    drug: Drug
    pd_event: PD_Event
    death_event: Death_Event
    pfs_days: "PFS (Days)"
    pfs_event: null
    recist: "RECIST response"
    benefit: "Binarized response"
    egfr_status: EGFR_Mutation_Status_mod
    io_line: IO_Line
    previous_chemo: Previous_palliative_chemo
    previous_target: Previous_palliative_target
    pd_l1_tps: PD-L1_TPS_mod

  derivation:
    pfs_event:
      method: any_of
      source_columns: [pd_event, death_event]
      overwrite: true
    benefit:
      prefer_existing: true
      recist_column: recist
      time_column: pfs_days
      positive_response_values: [CR, PR]
      durable_stable_values: [SD]
      min_days: 183
      positive_values: [1, "1", "YES", "Y", "TRUE", "BENEFIT", "RESPONDER", "DCB"]
      negative_values: [0, "0", "NO", "N", "FALSE", "NO BENEFIT", "NONBENEFIT", "NON-BENEFIT", "NCB"]

  exclude_from_modeling:
    - drug

  feature_sets:
    base:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
      - drug_class
    with_pd_l1:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
      - drug_class
      - pd_l1_tps

immune_features:
  feature_table_path: data/20260309_pilot/results/version1/subtype_discovery/base_run_v4/patient_features.csv
  id_col: patient_id
  analysis_id_col: analysis_id
  filters:
    timepoint: base
  carry_columns:
    - analysis_id
    - source
    - batch
    - timepoint
  drop_columns:
    - age
    - sex

  blocks:
    proportion:
      source: proportion_long
      path: data/20260309_pilot/results/version1/subtype_discovery/base_run_v4/celltype_proportions_long.csv
      analysis_id_col: analysis_id
      celltype_col: celltype
      value_col: prop
      count_col: n_cells
      include_celltypes:
        - naive/TCM CD4+T
        - effector CD8+T
        - NK
        - B
        - CD14 Mono
        - CD16 Mono
        - T/NK
      prefix: prop
      transform: ilr
      pseudocount: 1e-6
      required: true
    pc:
      source: feature_table
      prefix: pc
      include_regex: "_PC[0-9]+$"
      transform: none
      required: true

analyses:
  primary:
    - name: clinical_only
      clinical_feature_set: base
      immune_blocks: []
      description: Clinical-only baseline model on the matched cohort.
    - name: clinical_plus_prop_plus_pc
      clinical_feature_set: base
      immune_blocks: [proportion, pc]
      description: Primary combined model with clinical covariates plus immune proportion and PC features.

  secondary:
    - name: immune_only_prop_plus_pc
      clinical_feature_set: null
      immune_blocks: [proportion, pc]
      description: Immune-only reference model.
    - name: clinical_plus_prop
      clinical_feature_set: base
      immune_blocks: [proportion]
      description: Combined model using proportion features only.
    - name: clinical_plus_prop_plus_pc
      clinical_feature_set: base
      immune_blocks: [proportion, pc]
      description: Combined model using proportion plus PC features.
    - name: clinical_plus_prop_plus_pc_with_pd_l1
      clinical_feature_set: with_pd_l1
      immune_blocks: [proportion, pc]
      description: Combined model that additionally includes PD-L1 TPS.

comparisons:
  - name: primary_incremental_value
    analysis_block: primary
    reference: clinical_only
    candidate: clinical_plus_prop_plus_pc
  - name: prop_vs_prop_plus_pc
    analysis_block: secondary
    reference: clinical_plus_prop
    candidate: clinical_plus_prop_plus_pc
  - name: pd_l1_increment
    analysis_block: secondary
    reference: clinical_plus_prop_plus_pc
    candidate: clinical_plus_prop_plus_pc_with_pd_l1

modeling:
  random_state: 42

  endpoints:
    binary:
      - name: Binarized_response
        outcome_col: benefit
        slug: binarized_response
        description: Precomputed binary benefit endpoint from the clinical metadata file.
    survival:
      - name: PFS
        time_col: pfs_days
        event_col: pfs_event

  data_qc:
    min_non_missing_fraction: 0.6
    min_unique_values: 2

  multicollinearity:
    enabled: true
    correlation_threshold: 0.95
    vif:
      enabled: true
      max_vif: 10.0
      max_iter: 50

  resampling:
    n_outer_splits: 5
    n_outer_repeats: 10
    n_inner_splits: 4

  stability:
    method: bootstrap
    n_bootstrap: 500
    selection_threshold: 0.05
    selection_scope: all #immune_only

  logistic:
    alpha_grid: [0.01, 0.05, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
    l1_ratio_grid: [0.5, 0.75, 0.9, 0.95, 1.0]
    selection_rule: one_se
    max_iter: 5000
    force_in_note: >
      Elastic-net logistic regression is implemented with sklearn saga, so clinical covariates
      are not fully force-in; clinical and immune predictors are penalized together.

  cox:
    penalizer_grid: [0.01, 0.05, 0.1, 0.5, 1.0, 2.0, 5.0]
    l1_ratio_grid: [0.5, 0.75, 0.9, 0.95, 1.0]
    selection_rule: one_se
    clinical_penalty_factor: 1.0
