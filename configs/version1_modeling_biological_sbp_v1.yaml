paths:
  output_dir: data/20260309_pilot/results/version1/endpoint_modeling/biological_SBP_v1

clinical:
  path: data/20260309_pilot/nsclc_n73/20260309_eQTL Study_SNU (Pilot cohort)-2_mod.txt
  column_map:
    patient_id: sample_id
    sex: "Sex M: 1  F: 2"
    age: Age_IO
    histology: Histology_mod
    smoking: "Smoking Never: 0 Ex: 1 Current: 2"
    ecog: "ECOG _PS"
    drug: Drug
    pd_event: PD_Event
    death_event: Death_Event
    pfs_days: "PFS (Days)"
    pfs_event: null
    recist: "RECIST response"
    benefit: "Binarized response"
    egfr_status: EGFR_Mutation_Status_mod
    io_line: IO_Line
    previous_chemo: Previous_palliative_chemo
    previous_target: Previous_palliative_target
    pd_l1_tps: PD-L1_TPS_mod

  derivation:
    pfs_event:
      method: any_of
      source_columns: [pd_event, death_event]
      overwrite: true
    benefit:
      prefer_existing: true
      recist_column: recist
      time_column: pfs_days
      positive_response_values: [CR, PR]
      durable_stable_values: [SD]
      min_days: 183
      positive_values: [1, "1", "YES", "Y", "TRUE", "BENEFIT", "RESPONDER", "DCB"]
      negative_values: [0, "0", "NO", "N", "FALSE", "NO BENEFIT", "NONBENEFIT", "NON-BENEFIT", "NCB"]
    restricted_survival:
      - name: PFS_6m_restricted
        source_time_col: pfs_days
        source_event_col: pfs_event
        horizon_days: 183
        time_col: pfs_6m_days
        event_col: pfs_6m_event
        overwrite: true

  exclude_from_modeling:
    - drug

  feature_sets:
    base:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
      - drug_class
    with_pd_l1:
      - sex
      - age
      - histology
      - smoking
      - ecog
      - egfr_status
      - io_line
      - previous_chemo
      - previous_target
      - drug_class
      - pd_l1_tps

immune_features:
  feature_table_path: data/20260309_pilot/results/version1/subtype_discovery/biological_SBP_v1/patient_features.csv
  id_col: patient_id
  analysis_id_col: analysis_id
  filters:
    timepoint: base
  carry_columns:
    - analysis_id
    - source
    - batch
    - timepoint
  drop_columns:
    - age
    - sex

  blocks:
    bio_sbp:
      source: feature_table
      prefix: bio
      include_columns:
        - LM_SBP_2part_ilr
        - CD14_CD16_SBP_2part_ilr
        - patient_naive_score_mean
        - patient_cytotoxic_score_mean
        - patient_naive_minus_cytotoxic_score_mean
        - patient_cd14_score_mean
        - patient_cd16_score_mean
        - patient_cd14_minus_cd16_score_mean
      transform: none
      required: true
    pc:
      source: feature_table
      prefix: pc
      include_regex: "_PC[0-9]+$"
      include_pc_indices: [1, 2]
      transform: none
      required: true

analyses:
  primary:
    - name: clinical_only
      clinical_feature_set: base
      immune_blocks: []
      description: Clinical-only baseline model on the matched cohort.
    - name: clinical_plus_bio_sbp
      clinical_feature_set: base
      immune_blocks: [bio_sbp]
      description: Primary combined model with clinical covariates plus biological SBP immune features.

  secondary:
    - name: immune_only_bio_sbp_plus_pc
      clinical_feature_set: null
      immune_blocks: [bio_sbp, pc]
      description: Immune-only reference model using biological SBP immune features and PC features.
    - name: clinical_plus_bio_sbp
      clinical_feature_set: base
      immune_blocks: [bio_sbp]
      description: Combined model using biological SBP immune features only.
    - name: clinical_plus_bio_sbp_plus_pc
      clinical_feature_set: base
      immune_blocks: [bio_sbp, pc]
      description: Combined model using biological SBP immune features plus PC features.
    - name: clinical_plus_bio_sbp_with_pd_l1
      clinical_feature_set: with_pd_l1
      immune_blocks: [bio_sbp]
      description: Combined model using biological SBP immune features with PD-L1 TPS.
    - name: clinical_plus_bio_sbp_plus_pc_with_pd_l1
      clinical_feature_set: with_pd_l1
      immune_blocks: [bio_sbp, pc]
      description: Combined model using biological SBP immune features plus PC features with PD-L1 TPS.

comparisons:
  - name: primary_incremental_value
    analysis_block: primary
    reference: clinical_only
    candidate: clinical_plus_bio_sbp
  - name: bio_sbp_vs_bio_sbp_plus_pc
    analysis_block: secondary
    reference: clinical_plus_bio_sbp
    candidate: clinical_plus_bio_sbp_plus_pc
  - name: pd_l1_increment_bio_sbp
    analysis_block: secondary
    reference: clinical_plus_bio_sbp
    candidate: clinical_plus_bio_sbp_with_pd_l1
  - name: pd_l1_increment_bio_sbp_plus_pc
    analysis_block: secondary
    reference: clinical_plus_bio_sbp_plus_pc
    candidate: clinical_plus_bio_sbp_plus_pc_with_pd_l1

modeling:
  random_state: 42

  endpoints:
    binary:
      - name: Binarized_response
        outcome_col: benefit
        slug: binarized_response
        description: Precomputed binary benefit endpoint from the clinical metadata file.
    survival:
      - name: PFS
        time_col: pfs_days
        event_col: pfs_event
      - name: PFS_6m_restricted
        time_col: pfs_6m_days
        event_col: pfs_6m_event
        slug: pfs_6m_restricted
        description: Cox endpoint restricted to the first 183 days; follow-up beyond 6 months is administratively censored at day 183.

  data_qc:
    min_non_missing_fraction: 0.6
    min_unique_values: 2

  multicollinearity:
    enabled: true
    correlation_threshold: 0.95
    vif:
      enabled: true
      max_vif: 10.0
      max_iter: 50

  resampling:
    n_outer_splits: 5
    n_outer_repeats: 10
    n_inner_splits: 4

  stability:
    method: bootstrap
    n_bootstrap: 500
    selection_threshold: 0.05
    selection_scope: all

  logistic:
    alpha_grid: [1e-3, 3e-3, 1e-2, 3e-2, 1e-1, 3e-1, 1, 3]
    l1_ratio_grid: [0.25, 0.5, 0.75, 0.9, 0.95, 0.99,1]
    selection_rule: best
    max_iter: 5000
    force_in_note: >
      Elastic-net logistic regression is implemented with sklearn saga, so clinical covariates
      are not fully force-in; clinical and immune predictors are penalized together.

  cox:
    penalizer_grid: [1e-3, 3e-3, 1e-2, 3e-2, 1e-1, 3e-1, 1, 3]
    l1_ratio_grid: [0.25, 0.5, 0.75, 0.9, 0.95, 0.99,1]
    selection_rule: best
    clinical_penalty_factor: 1.0
